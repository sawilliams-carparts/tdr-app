// ── 1. Submissions Over Time ──────────────────────────────────────────────────
function renderTrendSection(data,isDark,textCol,gridCol){
  // Group by date
  const counts={};
  data.forEach(s=>{
    const d=new Date(s.timestamp);
    if(isNaN(d)) return;
    const key=d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    counts[key]=(counts[key]||0)+1;
  });
  const keys=Object.keys(counts).slice(-30); // max 30 dates
  if(!keys.length) return `<div class="reports-section">
    <div class="reports-section-header">${t('reportsSectionTrend')}</div>
    <div class="reports-section-body"><p class="reports-no-data">${t('reportsNoData')}</p></div></div>`;
  const vals=keys.map(k=>counts[k]);
  const maxVal=Math.max(...vals,1);
  const W=820,H=180,PAD_L=36,PAD_B=28,PAD_T=10,PAD_R=10;
  const bw=Math.max(4,Math.floor((W-PAD_L-PAD_R)/keys.length)-4);
  const bars=keys.map((k,i)=>{
    const bh=Math.round((vals[i]/maxVal)*(H-PAD_T-PAD_B));
    const x=PAD_L+(i/keys.length)*(W-PAD_L-PAD_R)+(((W-PAD_L-PAD_R)/keys.length)-bw)/2;
    const y=H-PAD_B-bh;
    return `<rect class="chart-bar" x="${x}" y="${y}" width="${bw}" height="${bh}" rx="3" fill="#004C80" opacity="0.85">
      <title>${k}: ${vals[i]} submission${vals[i]!==1?'s':''}</title></rect>
      ${keys.length<=15?`<text x="${x+bw/2}" y="${H-PAD_B+14}" text-anchor="middle" font-size="9" fill="${textCol}" transform="rotate(-35,${x+bw/2},${H-PAD_B+14})">${k}</text>`:''}`;
  }).join('');
  // Y grid lines
  const steps=4;
  const grid=Array.from({length:steps+1},(_,i)=>{
    const v=Math.round((maxVal/steps)*i);
    const y=H-PAD_B-Math.round((v/maxVal)*(H-PAD_T-PAD_B));
    return `<line x1="${PAD_L}" y1="${y}" x2="${W-PAD_R}" y2="${y}" stroke="${gridCol}" stroke-width="1"/>
      <text x="${PAD_L-4}" y="${y+4}" text-anchor="end" font-size="9" fill="${textCol}">${v}</text>`;
  }).join('');
  return `<div class="reports-section">
    <div class="reports-section-header">${t('reportsSectionTrend')}</div>
    <div class="reports-section-body">
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" style="max-height:200px">
        ${grid}${bars}
        <line x1="${PAD_L}" y1="${PAD_T}" x2="${PAD_L}" y2="${H-PAD_B}" stroke="${textCol}" stroke-width="1"/>
        <line x1="${PAD_L}" y1="${H-PAD_B}" x2="${W-PAD_R}" y2="${H-PAD_B}" stroke="${textCol}" stroke-width="1"/>
      </svg>
    </div></div>`;
}

// ── 2. Safety & Maintenance Heatmap ──────────────────────────────────────────
function renderOppHeatmap(data,isDark,textCol){
  const opps=data.filter(s=>s.safetyOpps==='Yes');
  if(!opps.length) return `<div class="reports-section">
    <div class="reports-section-header">${t('reportsSectionOpp')}</div>
    <div class="reports-section-body"><p class="reports-no-data">${t('reportsOppNone')}</p></div></div>`;

  // Build date×door matrix
  const dateSet=new Set(),doorSet=new Set();
  opps.forEach(s=>{
    const d=new Date(s.timestamp);
    if(isNaN(d)) return;
    dateSet.add(d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}));
    doorSet.add((s.dc||'?')+'-'+(s.door||'?'));
  });
  const dates=[...dateSet].sort((a,b)=>new Date(a)-new Date(b)).slice(-14);
  const doors=[...doorSet].sort();
  const matrix={};
  opps.forEach(s=>{
    const d=new Date(s.timestamp);
    if(isNaN(d)) return;
    const dateKey=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});
    const doorKey=(s.dc||'?')+'-'+(s.door||'?');
    if(!dates.includes(dateKey)||!doors.includes(doorKey)) return;
    matrix[dateKey]=matrix[dateKey]||{};
    matrix[dateKey][doorKey]=(matrix[dateKey][doorKey]||0)+1;
  });
  const maxCount=Math.max(...dates.flatMap(d=>doors.map(dr=>matrix[d]?.[dr]||0)),1);

  function heatColor(n){
    if(!n) return isDark?'#1e2a35':'#f5f5f5';
    const t=n/maxCount;
    // White → orange → dark red
    const r=Math.round(255);
    const g=Math.round(255*(1-t*0.85));
    const b=Math.round(255*(1-t));
    return `rgb(${r},${g},${b})`;
  }

  const header=`<tr><th style="text-align:right;padding:4px 8px;color:${textCol}">${t('reportsOppHeatY')} \\ ${t('reportsOppHeatX')}</th>${doors.map(d=>`<th style="color:${textCol}">${d}</th>`).join('')}</tr>`;
  const rows=dates.map(date=>{
    const cells=doors.map(door=>{
      const n=matrix[date]?.[door]||0;
      const bg=heatColor(n);
      const fg=n>maxCount*0.6?'#fff':'#333';
      return `<td style="background:${bg};color:${fg}">${n||''}</td>`;
    }).join('');
    return `<tr><td class="heatmap-row-label" style="color:${textCol}">${date}</td>${cells}</tr>`;
  }).join('');

  return `<div class="reports-section">
    <div class="reports-section-header">${t('reportsSectionOpp')}</div>
    <div class="reports-section-body">
      <div class="heatmap-wrap">
        <table class="heatmap-table"><thead>${header}</thead><tbody>${rows}</tbody></table>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:12px;font-size:11px;color:${textCol}">
        <span>Fewer</span>
        ${[0,0.25,0.5,0.75,1].map(t=>`<div style="width:20px;height:12px;background:${heatColor(t*maxCount)};border:1px solid #ddd;border-radius:2px"></div>`).join('')}
        <span>More</span>
      </div>
    </div></div>`;
}

// ── 3. Breakdown by DC & Door ─────────────────────────────────────────────────
function renderDoorBreakdown(data,isDark,textCol,gridCol){
  // Top 20 doors by submission count
  const counts={};
  data.forEach(s=>{
    const key=(s.dc||'?')+' Door '+(s.door||'?');
    counts[key]=(counts[key]||0)+1;
  });
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,20);
  if(!sorted.length) return '';
  const maxVal=sorted[0][1];
  const W=820,barH=22,gap=4,PAD_L=110,PAD_R=40,PAD_T=10;
  const H=PAD_T+sorted.length*(barH+gap);
  const bars=sorted.map(([k,v],i)=>{
    const bw=Math.round((v/maxVal)*(W-PAD_L-PAD_R));
    const y=PAD_T+i*(barH+gap);
    const opps=data.filter(s=>((s.dc||'?')+' Door '+(s.door||'?'))===k&&s.safetyOpps==='Yes').length;
    return `<text x="${PAD_L-6}" y="${y+barH/2+4}" text-anchor="end" font-size="10" fill="${textCol}">${k}</text>
      <rect class="chart-bar" x="${PAD_L}" y="${y}" width="${bw||2}" height="${barH}" rx="3" fill="#004C80" opacity="0.85">
        <title>${k}: ${v} submission${v!==1?'s':''}, ${opps} opportunity flag${opps!==1?'s':''}</title></rect>
      ${opps?`<rect x="${PAD_L}" y="${y}" width="${Math.round((opps/maxVal)*(W-PAD_L-PAD_R))}" height="${barH}" rx="3" fill="#e67e22" opacity="0.7"/>`:``}
      <text x="${PAD_L+bw+4}" y="${y+barH/2+4}" font-size="10" fill="${textCol}">${v}</text>`;
  }).join('');
  return `<div class="reports-section">
    <div class="reports-section-header">${t('reportsSectionDoor')}</div>
    <div class="reports-section-body">
      <div style="font-size:11px;color:#888;margin-bottom:8px">Top 20 doors · <span style="color:#004C80;font-weight:600">■</span> All submissions &nbsp; <span style="color:#e67e22;font-weight:600">■</span> Safety/maintenance flags</div>
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" style="max-height:${H+20}px">
        ${bars}
      </svg>
    </div></div>`;
}

// ── 4. Dock vs. Release Ratio ─────────────────────────────────────────────────
function renderDockRatio(data,isDark,textCol){
  const dock=data.filter(s=>s.tdrType==='Dock'||s.tdrType===t('optDock')).length;
  const rel=data.filter(s=>s.tdrType==='Release'||s.tdrType===t('optRelease')).length;
  const total=dock+rel||1;
  const dockPct=Math.round((dock/total)*100);
  const relPct=100-dockPct;
  const W=400,H=40,r=16;
  // Donut-style horizontal bar
  const dockW=Math.round((dock/total)*(W-2*r));
  return `<div class="reports-section">
    <div class="reports-section-header">${t('reportsSectionType')}</div>
    <div class="reports-section-body" style="display:flex;align-items:center;gap:30px;flex-wrap:wrap">
      <div>
        <svg viewBox="0 0 ${W} ${H}" style="width:${W}px;max-width:100%;height:${H}px">
          <rect x="0" y="8" width="${W}" height="${H-16}" rx="${H/2-8}" fill="${isDark?'#721c24':'#f8d7da'}"/>
          <rect x="0" y="8" width="${dockW+r}" height="${H-16}" rx="${H/2-8}" fill="#004C80"/>
          <text x="${Math.max(dockW/2,20)}" y="${H/2+5}" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">${dockPct}%</text>
          <text x="${dockW+r+(W-dockW-r)/2}" y="${H/2+5}" text-anchor="middle" font-size="12" font-weight="700" fill="${isDark?'#f8d7da':'#721c24'}">${relPct}%</text>
        </svg>
      </div>
      <div style="display:flex;gap:24px;flex-wrap:wrap">
        <div><div style="font-size:28px;font-weight:700;color:#004C80">${dock}</div><div style="font-size:12px;color:#888">${t('reportsDockLabel')} TDRs</div></div>
        <div><div style="font-size:28px;font-weight:700;color:#c0392b">${rel}</div><div style="font-size:12px;color:#888">${t('reportsRelLabel')} TDRs</div></div>
        <div><div style="font-size:28px;font-weight:700;color:${textCol}">${total}</div><div style="font-size:12px;color:#888">Total</div></div>
      </div>
    </div></div>`;
}

// ── 5. Submissions by Shift & Leadership ──────────────────────────────────────
function renderShiftSection(data,isDark,textCol,gridCol){
  const shiftCounts={},levelCounts={};
  data.forEach(s=>{
    if(s.shift) shiftCounts[s.shift]=(shiftCounts[s.shift]||0)+1;
    if(s.leadershipLevel) levelCounts[s.leadershipLevel]=(levelCounts[s.leadershipLevel]||0)+1;
  });
  const shifts=Object.entries(shiftCounts).sort((a,b)=>b[1]-a[1]);
  const levels=Object.entries(levelCounts).sort((a,b)=>b[1]-a[1]);
  if(!shifts.length&&!levels.length) return '';
  const COLORS=['#004C80','#2980b9','#16a085','#8e44ad','#d35400'];
  function miniBar(entries,maxV){
    return entries.map(([k,v],i)=>{
      const bw=Math.round((v/maxV)*260);
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div style="width:90px;font-size:12px;color:${textCol};text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${k}</div>
        <div style="width:${bw}px;min-width:2px;height:20px;background:${COLORS[i%COLORS.length]};border-radius:4px"></div>
        <div style="font-size:12px;color:${textCol}">${v}</div>
      </div>`;
    }).join('');
  }
  const maxShift=Math.max(...shifts.map(e=>e[1]),1);
  const maxLevel=Math.max(...levels.map(e=>e[1]),1);
  return `<div class="reports-section">
    <div class="reports-section-header">${t('reportsSectionShift')}</div>
    <div class="reports-section-body" style="display:flex;gap:40px;flex-wrap:wrap">
      <div style="flex:1;min-width:200px">
        <div style="font-size:13px;font-weight:600;color:${textCol};margin-bottom:10px">By Shift</div>
        ${miniBar(shifts,maxShift)}
      </div>
      <div style="flex:1;min-width:200px">
        <div style="font-size:13px;font-weight:600;color:${textCol};margin-bottom:10px">By Leadership Level</div>
        ${miniBar(levels,maxLevel)}
      </div>
    </div></div>`;
}


// ── CSV Options Modal ─────────────────────────────────────────────────────────

  const totalCount=fullHistory.length;
  const filename=`Door_${door}_${dc}_history.csv`;

  const overlay=document.createElement('div');
  overlay.className='csv-modal-wrap';
  overlay.id='csv-options-overlay';
  overlay.onclick=e=>{if(e.target===overlay) overlay.remove();};

  // Default date range: last 30 days
  const today=new Date();
  const thirtyDaysAgo=new Date(today-30*864e5);
  const fmt=d=>d.toISOString().slice(0,10);

  overlay.innerHTML=`
    <div class="csv-modal">
      <button class="modal-close" onclick="document.getElementById('csv-options-overlay').remove()" style="position:absolute;top:12px;right:14px">×</button>
      <h3>${t('csvDownload')}</h3>

      <button class="csv-option-btn" onclick="
        downloadCSV(getDoorHistoryFull('${dc}','${door}','${side}'),'${filename}');
        document.getElementById('csv-options-overlay').remove();">
        <span class="csv-opt-icon">📋</span>
        <span>
          <span class="csv-opt-title">${t('csvAllHistory')}</span>
          <span class="csv-opt-sub">${t('csvAllSub',totalCount)}</span>
        </span>
      </button>

      <button class="csv-option-btn" onclick="document.getElementById('csv-date-range').classList.toggle('visible')">
        <span class="csv-opt-icon">📅</span>
        <span>
          <span class="csv-opt-title">${t('csvDateRange')}</span>
          <span class="csv-opt-sub">${t('csvDateRangeSub')}</span>
        </span>
      </button>

      <div class="csv-date-range" id="csv-date-range">
        <label>From</label>
        <input type="date" id="csv-from" value="${fmt(thirtyDaysAgo)}" max="${fmt(today)}"/>
        <label>${t('csvTo')}</label>
        <input type="date" id="csv-to" value="${fmt(today)}" max="${fmt(today)}"/>
        <button class="btn-primary" style="width:100%;margin-top:12px;padding:9px"
          onclick="
            const from=new Date(document.getElementById('csv-from').value+'T00:00:00');
            const to=new Date(document.getElementById('csv-to').value+'T23:59:59');
            const filtered=getDoorHistoryFull('${dc}','${door}','${side}').filter(s=>{
              const d=new Date(s.timestamp);return d>=from&&d<=to;
            });
            if(!filtered.length){alert('No records found in that date range.');return;}
            const rangeFile='Door_${door}_${dc}_'+document.getElementById('csv-from').value+'_to_'+document.getElementById('csv-to').value+'.csv';
            downloadCSV(filtered,rangeFile);
            document.getElementById('csv-options-overlay').remove();">
          Download ${totalCount} record${totalCount!==1?'s':''} in range
        </button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

  document.body.appendChild(overlay);

  function setBar(pct){
    const bar=document.getElementById('howto-recapture-bar');
    if(bar) bar.style.width=pct+'%';
  }
  function setMsg(msg){
    const el=document.getElementById('howto-recapture-msg');
    if(el) el.textContent=msg;
  }

  // Clear cached screenshots so they re-render
  ['topbar','dashboard','filters','form'].forEach(k=>delete _howtoScreenshots[k]);

  setBar(5);
  setMsg('Capturing navigation bar…');
  await triggerHowToCapture('topbar');
  setBar(30);
  setMsg('Capturing dashboard…');
  await triggerHowToCapture('dashboard');
  setBar(55);
  setMsg('Capturing filter controls…');
  await triggerHowToCapture('filters');
  setBar(80);
  setMsg('Capturing form…');
  await triggerHowToCapture('form');
  setBar(100);
  setMsg('Done!');

  // Fade out first, then navigate to How-To once fade completes
  overlay.style.transition='opacity 0.5s ease';
  overlay.style.opacity='0';
  overlay.style.pointerEvents='none';
  await new Promise(r=>setTimeout(r,520));
  overlay.remove();
  showView('howto');
